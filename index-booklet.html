<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibroid Clinic Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e9e4d7;font-family:Arial,sans-serif}
.desktop-book{display:flex;flex-direction:column;align-items:center;padding:30px}
.spread{display:none;gap:15px;align-items:flex-start;justify-content:center}
.spread.active{display:flex}
.page{width:45vw;max-width:650px;box-shadow:0 8px 30px rgba(0,0,0,.15);background:white}
.page img{width:100%;display:block}
.controls{margin-top:20px;display:flex;gap:20px}
.controls button{border:none;padding:14px 20px;border-radius:50px;cursor:pointer;font-size:18px;background:#6c4ccf;color:white}
.mobile-book{display:none}
.mobile-book img{width:100%;display:block}
@media (max-width:900px){
.desktop-book{display:none}
.mobile-book{display:block}
}
</style>
</head>
<body>

<div class="mobile-book">
<img src="1.png"><img src="2.png"><img src="3.png"><img src="4.png">
<img src="5.png"><img src="6.png"><img src="7.png"><img src="8.png">
</div>

<div class="desktop-book">
<div class="spread active"><div class="page"><img src="1.png"></div><div class="page"><img src="2.png"></div></div>
<div class="spread"><div class="page"><img src="3.png"></div><div class="page"><img src="4.png"></div></div>
<div class="spread"><div class="page"><img src="5.png"></div><div class="page"><img src="6.png"></div></div>
<div class="spread"><div class="page"><img src="7.png"></div><div class="page"><img src="8.png"></div></div>

<div class="controls">
<button onclick="prevSpread()">◀ Previous</button>
<button onclick="nextSpread()">Next ▶</button>
</div>
</div>

<script>
let current=0;
const spreads=document.querySelectorAll('.spread');
function showSpread(i){spreads.forEach(s=>s.classList.remove('active'));spreads[i].classList.add('active');}
function nextSpread(){if(current<spreads.length-1){current++;showSpread(current);}}
function prevSpread(){if(current>0){current--;showSpread(current);}}
</script>
</body>
</html>
