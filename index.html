<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibroid Clinic Guide</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8e3d8;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* MOBILE */

.mobile{
    display:none;
}

.mobile img{
    width:100%;
    display:block;
}

/* DESKTOP */

.desktop{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.book{
    display:flex;
    gap:4px;
    justify-content:center;
    align-items:flex-start;
}

.page{
    width:44vw;
    max-width:700px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.page img{
    width:100%;
    display:block;
}

/* SIDE NAVIGATION */

.sideNav{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:56px;
    height:56px;
    border:none;
    border-radius:50%;
    background:#6c4ccf;
    color:white;
    font-size:22px;
    cursor:pointer;
    z-index:9999;
    box-shadow:0 6px 18px rgba(0,0,0,.15);
    opacity:.9;
    transition:.2s ease;
}

.sideNav:hover{
    opacity:1;
    transform:translateY(-50%) scale(1.05);
}

.sidePrev{
    left:120px;
}

.sideNext{
    right:120px;
}

/* MOBILE */

@media(max-width:900px){

    .desktop{
        display:none;
    }

    .mobile{
        display:block;
    }

}

</style>
</head>

<body>

<!-- MOBILE -->

<div class="mobile">

<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">

</div>

<!-- DESKTOP -->

<div class="desktop">

<button class="sideNav sidePrev" onclick="prev()">◀</button>

<div class="book">

<div class="page">
<img id="leftPage" src="1.png">
</div>

<div class="page">
<img id="rightPage" src="2.png">
</div>

</div>

<button class="sideNav sideNext" onclick="next()">▶</button>

</div>

<script>

const pages = [
'1.png',
'2.png',
'3.png',
'4.png',
'5.png',
'6.png',
'7.png',
'8.png'
];

let spread = 0;

function render(){

document.getElementById('leftPage').src =
pages[spread * 2];

document.getElementById('rightPage').src =
pages[(spread * 2) + 1];

}

function next(){

if(spread < 3){
spread++;
render();
}

}

function prev(){

if(spread > 0){
spread--;
render();
}

}

document.addEventListener('keydown', function(e){

if(e.key === 'ArrowRight'){
next();
}

if(e.key === 'ArrowLeft'){
prev();
}

});

render();

</script>

</body>
</html>
