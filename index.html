<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibroid Clinic Guide</title>

<style>

html,body{
    margin:0;
    padding:0;
    background:#e8e3d8;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#flipbook{
    width:100%;
    height:100vh;
}

.page{
    background:white;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.mobile{
    display:none;
}

@media(max-width:900px){

    #flipbook{
        display:none;
    }

    .mobile{
        display:block;
    }

    .mobile img{
        width:100%;
        display:block;
    }

    html,body{
        overflow:auto;
    }

}

</style>
</head>

<body>

<!-- MOBILE -->

<div class="mobile">
<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">
</div>

<!-- DESKTOP -->

<div id="flipbook">

<div class="page"><img src="1.png"></div>
<div class="page"><img src="2.png"></div>
<div class="page"><img src="3.png"></div>
<div class="page"><img src="4.png"></div>
<div class="page"><img src="5.png"></div>
<div class="page"><img src="6.png"></div>
<div class="page"><img src="7.png"></div>
<div class="page"><img src="8.png"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

if(window.innerWidth > 900){

    const pageFlip = new St.PageFlip(
        document.getElementById("flipbook"),
        {
            width:675,
            height:844,
            size:"stretch",
            minWidth:315,
            maxWidth:1200,
            minHeight:420,
            maxHeight:1600,
            showCover:true,
            mobileScrollSupport:true,
            flippingTime:800,
            usePortrait:false,
            startPage:0
        }
    );

    pageFlip.loadFromHTML(
        document.querySelectorAll(".page")
    );

}

</script>

</body>
</html>
