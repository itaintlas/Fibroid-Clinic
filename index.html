```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibroid Clinic Guide</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8e3d8;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* MOBILE */

.mobile{
    display:none;
}

.mobile img{
    width:100%;
    display:block;
}

/* DESKTOP */

.desktop{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.book{
    display:flex;
    gap:4px;
    justify-content:center;
    align-items:flex-start;
    perspective:2000px;
}

.page{
    width:44vw;
    max-width:700px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transform-style:preserve-3d;
}

.page img{
    width:100%;
    display:block;
}

.flip{
    animation:pageFlip .7s ease;
}

@keyframes pageFlip{

    0%{
        transform:rotateY(0deg);
    }

    50%{
        transform:rotateY(-90deg);
    }

    100%{
        transform:rotateY(0deg);
    }

}

/* SIDE NAVIGATION */

.sideNav{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:56px;
    height:56px;
    border:none;
    border-radius:50%;
    background:#6c4ccf;
    color:white;
    font-size:22px;
    cursor:pointer;
    z-index:9999;
    box-shadow:0 6px 18px rgba(0,0,0,.15);
    opacity:.9;
    transition:.2s ease;
}

.sideNav:hover{
    opacity:1;
}

.sidePrev{
    left:120px;
}

.sideNext{
    right:120px;
}

/* PAGE COUNTER */

.counter{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 18px;
    border-radius:999px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    color:#6c4ccf;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .desktop{
        display:none;
    }

    .mobile{
        display:block;
    }

}

</style>
</head>
<body>

<!-- MOBILE -->

<div class="mobile">

<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">

</div>

<!-- DESKTOP -->

<div class="desktop">

<button class="sideNav sidePrev" onclick="prev()">◀</button>

<div class="book">

<div class="page">
<img id="leftPage" src="1.png">
</div>

<div class="page" id="rightWrapper">
<img id="rightPage" src="2.png">
</div>

</div>

<button class="sideNav sideNext" onclick="next()">▶</button>

<div class="counter" id="counter">
Pages 1 - 2
</div>

</div>

<script>

const pages = [
'1.png',
'2.png',
'3.png',
'4.png',
'5.png',
'6.png',
'7.png',
'8.png'
];

let spread = 0;

function render(){

    document.getElementById('leftPage').src =
        pages[spread * 2];

    document.getElementById('rightPage').src =
        pages[(spread * 2) + 1];

    document.getElementById('counter').innerText =
        'Pages ' +
        ((spread * 2) + 1) +
        ' - ' +
        ((spread * 2) + 2);

}

function animateTo(newSpread){

    const rightPage =
        document.getElementById('rightWrapper');

    rightPage.classList.add('flip');

    setTimeout(()=>{

        spread = newSpread;

        render();

    },350);

    setTimeout(()=>{

        rightPage.classList.remove('flip');

    },700);

}

function next(){

    if(spread < 3){

        animateTo(spread + 1);

    }

}

function prev(){

    if(spread > 0){

        animateTo(spread - 1);

    }

}

document.addEventListener('keydown',function(e){

    if(e.key === 'ArrowRight'){
        next();
    }

    if(e.key === 'ArrowLeft'){
        prev();
    }

});

render();

</script>

</body>
</html>
